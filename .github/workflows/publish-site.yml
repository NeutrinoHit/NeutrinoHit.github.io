name: Publish site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-site
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Publish rendered site to gh-pages
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/neutrinohit-site"
          rm -rf "${site_dir}"
          mkdir -p "${site_dir}"
          cp -R _site/. "${site_dir}/"
          touch "${site_dir}/.nojekyll"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan gh-pages-deploy
          git rm -rf . >/dev/null 2>&1 || true
          git clean -fdx
          cp -R "${site_dir}/." .
          git add -A
          git commit -m "Build site from ${GITHUB_SHA}" || exit 0
          git push origin HEAD:gh-pages --force
